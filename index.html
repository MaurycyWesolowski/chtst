<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Testownik CHTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col items-center font-sans selection:bg-orange-600">

    <div class="w-full max-w-md px-6 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-black text-xl tracking-tighter italic text-zinc-100 flex items-center gap-2">
                TESTOWNIK <span class="text-orange">CHTS</span>
            </h1>
            <div class="flex gap-2 items-center">
                <button id="pawel-mode-btn" class="flex items-center bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded-full hover:border-blue-500 transition-all text-xs font-bold text-zinc-500 mr-2" title="Tryb Pawełka (Dla Daltonistów)">👁️</button>
                <div class="flex items-center bg-zinc-900 border border-green-900/40 px-3 py-1 rounded-full">
                    <span class="text-[10px] mr-1">✅</span>
                    <span id="stat-correct" class="text-xs font-bold text-green-500">0</span>
                </div>
                <div class="flex items-center bg-zinc-900 border border-red-900/40 px-3 py-1 rounded-full">
                    <span class="text-[10px] mr-1">❌</span>
                    <span id="stat-wrong" class="text-xs font-bold text-red-500">0</span>
                </div>
            </div>
        </div>

        <div id="quiz-ui" class="hidden mb-8">
            <div class="flex justify-between text-[9px] font-bold text-zinc-500 uppercase mb-2 tracking-widest">
                <span>Postęp opanowania</span>
                <span id="mastery-global">0%</span>
            </div>
            <div class="h-1 w-full bg-zinc-900 rounded-full overflow-hidden">
                <div id="mastery-bar" class="h-full bg-orange shadow-[0_0_10px_#FF6B00] transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <main id="main-card" class="bg-zinc-950 rounded-[2.5rem] p-8 shadow-2xl border border-zinc-900 orange-glow min-h-[480px] flex flex-col relative">
            
            <!-- EKRAN LOGOWANIA DO KONTA -->
            <div id="auth-screen" class="text-center py-8">
                <div class="text-6xl mb-8 opacity-20">🔐</div>
                <h2 id="auth-title" class="text-xl font-bold mb-6 uppercase tracking-widest text-zinc-400 italic">LOGOWANIE</h2>
                
                <input type="email" id="auth-email" placeholder="Adres E-mail" autocomplete="email"
                       class="w-full p-4 mb-4 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all placeholder:text-sm text-center">

                <input type="password" id="auth-pass" placeholder="Hasło (min. 6 znaków)" autocomplete="current-password"
                       class="w-full p-4 mb-4 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all placeholder:text-sm text-center">

                <input type="text" id="auth-nick" placeholder="Twój Wyświetlany Nick" autocomplete="off"
                       class="hidden w-full p-4 mb-4 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all placeholder:text-sm text-center">

                <button id="auth-action-btn" class="block w-full border-2 bg-orange border-orange text-black py-4 rounded-xl font-black text-sm cursor-pointer hover:bg-orange-600 transition-all uppercase shadow-lg disabled:opacity-50 mt-4">
                    ZALOGUJ SIĘ
                </button>

                <button id="auth-google-btn" class="block w-full border-2 border-zinc-200 bg-white text-black py-4 rounded-xl font-black text-sm cursor-pointer hover:bg-zinc-200 transition-all uppercase shadow-lg mt-4 flex justify-center items-center gap-2">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
                    ZALOGUJ PRZEZ GOOGLE
                </button>
                
                <button id="auth-toggle-btn" class="mt-4 text-[10px] text-zinc-500 hover:text-orange font-bold tracking-widest uppercase transition-all underline">
                    Nie mam konta. Zarejestruj się.
                </button>

                <p id="auth-msg" class="mt-4 text-xs font-bold text-red-500 min-h-4 tracking-wider"></p>
            </div>

            <!-- EKRAN ODBLOKOWYWANIA BAZY -->
            <div id="upload-screen" class="hidden text-center py-8">
                <div class="text-6xl mb-8 opacity-20">📂</div>
                <h2 class="text-xl font-bold mb-6 uppercase tracking-widest text-zinc-400 italic">ODBLOKUJ BAZĘ PYTAŃ</h2>
                
                <input type="password" id="pass-input" placeholder="Wpisz hasło ukrytej bazy pytań..." autocomplete="off"
                       class="w-full p-4 mb-4 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all placeholder:text-sm text-center">

                <button id="login-btn" class="block w-full border-2 bg-orange border-orange text-black py-4 rounded-xl font-black text-sm cursor-pointer hover:bg-orange-600 transition-all uppercase shadow-lg disabled:opacity-50 mt-4">
                    Pozyskaj z serwera i Rozpocznij 🚀
                </button>
                <p id="auth-status" class="mt-4 text-xs font-bold text-red-500 min-h-4 tracking-wider"></p>

                <div class="mt-8 border-t border-zinc-800 pt-6">
                    <p class="text-[10px] text-zinc-600 uppercase font-black mb-3 tracking-widest">Opcja Awaryjna (Brak Sieci)</p>
                    <input type="file" id="fileInput" class="hidden" accept=".zip">
                    <label for="fileInput" class="block w-full border-2 border-zinc-800 text-zinc-500 py-3 rounded-xl font-black text-xs cursor-pointer hover:border-orange hover:text-orange transition-all uppercase">
                        Wczytaj plik własny z dysku (.zip)
                    </label>
                </div>
            </div>

            <!-- EKRAN NAUKI -->
            <div id="question-screen" class="hidden fade-in flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex gap-2">
                        <span id="question-nr" class="text-[9px] font-bold text-zinc-400 border border-zinc-700 px-2 py-0.5 rounded uppercase tracking-wider">#NR</span>
                        <span id="type-tag" class="text-[9px] font-bold text-orange border border-orange/30 px-2 py-0.5 rounded uppercase">TYP</span>
                    </div>
                    <div id="mastery-dots" class="flex gap-1.5"></div>
                </div>
                
                <div id="question-text" class="text-lg font-bold leading-relaxed mb-8 text-zinc-100"></div>
                <div id="options-grid" class="space-y-3 mb-6"></div>

                <div id="open-area" class="hidden mb-6">
                    <input type="text" id="answer-input" placeholder="Wpisz odpowiedź..." 
                           class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all">
                </div>

                <div class="mt-auto">
                    <div id="message-area" class="mb-4 text-center h-4 text-[10px] font-black uppercase tracking-widest transition-all"></div>
                    <button id="action-btn" class="w-full bg-orange text-black py-5 rounded-2xl font-black uppercase text-sm shadow-lg active:scale-95 transition-all">
                        Sprawdź
                    </button>
                </div>
            </div>
        </main>

        <div id="nav-controls" class="hidden mt-6 flex justify-center items-center gap-4 text-center">
            <button id="nav-back-btn" class="text-zinc-600 py-2 font-bold text-[10px] uppercase hover:text-orange transition-all tracking-widest">
                ⬅️ POWRÓT
            </button>
            <div class="h-4 w-px bg-zinc-800"></div>
            <button id="nav-reset-btn" class="text-zinc-600 py-2 font-bold text-[10px] uppercase hover:text-red-500 transition-all tracking-widest">
                🧽 RESET
            </button>
            <div class="h-4 w-px bg-zinc-800"></div>
            <button id="nav-logout-btn" class="text-zinc-600 py-2 font-bold text-[10px] uppercase hover:text-orange transition-all tracking-widest">
                WYLOGUJ SIĘ WPŁAW
            </button>
        </div>

        <div id="lobby-nav" class="hidden mt-6 flex justify-center items-center gap-4 text-center">
            <button id="lobby-logout-btn" class="text-zinc-600 py-2 font-bold text-[10px] uppercase hover:text-red-500 transition-all tracking-widest">
                WYLOGUJ KONTO Z URZĄDZENIA
            </button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
