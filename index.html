<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Testownik CHTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; -webkit-tap-highlight-color: transparent; }
        .orange-glow { box-shadow: 0 0 25px rgba(255, 107, 0, 0.1); }
        .text-orange { color: #FF6B00; }
        .bg-orange { background-color: #FF6B00; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn.selected { border-color: #FF6B00; background-color: rgba(255, 107, 0, 0.15); color: #FF6B00; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center font-sans selection:bg-orange-600">

    <div class="w-full max-w-md px-6 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="font-black text-xl tracking-tighter italic text-zinc-100 flex items-center gap-2">
                TESTOWNIK <span class="text-orange">CHTS</span>
            </h1>
            <div class="flex gap-2">
                <div class="flex items-center bg-zinc-900 border border-green-900/40 px-3 py-1 rounded-full">
                    <span class="text-[10px] mr-1">✅</span>
                    <span id="stat-correct" class="text-xs font-bold text-green-500">0</span>
                </div>
                <div class="flex items-center bg-zinc-900 border border-red-900/40 px-3 py-1 rounded-full">
                    <span class="text-[10px] mr-1">❌</span>
                    <span id="stat-wrong" class="text-xs font-bold text-red-500">0</span>
                </div>
            </div>
        </div>

        <div id="quiz-ui" class="hidden mb-8">
            <div class="flex justify-between text-[9px] font-bold text-zinc-500 uppercase mb-2 tracking-widest">
                <span>Postęp opanowania</span>
                <span id="mastery-global">0%</span>
            </div>
            <div class="h-1 w-full bg-zinc-900 rounded-full overflow-hidden">
                <div id="mastery-bar" class="h-full bg-orange shadow-[0_0_10px_#FF6B00] transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <main id="main-card" class="bg-zinc-950 rounded-[2.5rem] p-8 shadow-2xl border border-zinc-900 orange-glow min-h-[480px] flex flex-col relative">
            
            <div id="upload-screen" class="text-center py-8">
                <div class="text-6xl mb-8 opacity-20">📂</div>
                <h2 class="text-xl font-bold mb-6 uppercase tracking-widest text-zinc-400 italic">LOGOWANIE AGENTA</h2>
                
                <input type="text" id="nick-input" placeholder="Twój NICK (identyfikator)" autocomplete="off"
                       class="w-full p-4 mb-4 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all placeholder:text-sm text-center">

                <input type="password" id="pass-input" placeholder="Wpisz hasło do bazy pytań..." autocomplete="off"
                       class="w-full p-4 mb-4 rounded-xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all placeholder:text-sm text-center">

                <button id="login-btn" class="block w-full border-2 bg-orange border-orange text-black py-4 rounded-xl font-black text-sm cursor-pointer hover:bg-orange-600 transition-all uppercase shadow-lg disabled:opacity-50 mt-4">
                    Pobierz i Rozpocznij 🚀
                </button>
                <p id="auth-status" class="mt-4 text-xs font-bold text-red-500 min-h-4 tracking-wider"></p>

                <div class="mt-8 border-t border-zinc-800 pt-6">
                    <p class="text-[10px] text-zinc-600 uppercase font-black mb-3 tracking-widest">Opcja Awaryjna (Offline)</p>
                    <input type="file" id="fileInput" class="hidden" accept=".zip">
                    <label for="fileInput" class="block w-full border-2 border-zinc-800 text-zinc-500 py-3 rounded-xl font-black text-xs cursor-pointer hover:border-orange hover:text-orange transition-all uppercase">
                        Wczytaj plik własny (.zip)
                    </label>
                </div>
            </div>

            <div id="question-screen" class="hidden fade-in flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex gap-2">
                        <span id="question-nr" class="text-[9px] font-bold text-zinc-400 border border-zinc-700 px-2 py-0.5 rounded uppercase tracking-wider">#NR</span>
                        <span id="type-tag" class="text-[9px] font-bold text-orange border border-orange/30 px-2 py-0.5 rounded uppercase">TYP</span>
                    </div>
                    <div id="mastery-dots" class="flex gap-1.5"></div>
                </div>
                
                <div id="question-text" class="text-lg font-bold leading-relaxed mb-8 text-zinc-100"></div>
                <div id="options-grid" class="space-y-3 mb-6"></div>

                <div id="open-area" class="hidden mb-6">
                    <input type="text" id="answer-input" placeholder="Wpisz odpowiedź..." 
                           class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all">
                </div>

                <div class="mt-auto">
                    <div id="message-area" class="mb-4 text-center h-4 text-[10px] font-black uppercase tracking-widest transition-all"></div>
                    <button id="action-btn" class="w-full bg-orange text-black py-5 rounded-2xl font-black uppercase text-sm shadow-lg active:scale-95 transition-all">
                        Sprawdź
                    </button>
                </div>
            </div>
        </main>

        <div id="nav-controls" class="hidden mt-6 text-center">
            <button onclick="changeQuestion(-1)" class="text-zinc-600 py-2 font-bold text-[10px] uppercase hover:text-orange transition-all tracking-widest">
                ⬅️ POWRÓT
            </button>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let selectedIndices = [];
        let stats = { correct: 0, wrong: 0, mastered: 0 };
        let isAnswered = false;

        const actionBtn = document.getElementById('action-btn');
        const messageArea = document.getElementById('message-area');

        // Losowanie Fisher-Yates
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        let currentNick = "Gość";
        let currentDB = "local";

        document.getElementById('login-btn').addEventListener('click', async () => {
            const nick = document.getElementById('nick-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            const status = document.getElementById('auth-status');

            if (!nick || !pass) {
                status.innerText = "Podaj NICK oraz HASŁO!";
                status.className = "mt-4 text-xs font-bold text-red-500 min-h-4 tracking-wider";
                return;
            }

            status.innerText = "Szukam bazy w sieci... 🕵️‍♂️";
            status.className = "mt-4 text-xs font-bold text-orange min-h-4 tracking-wider";
            document.getElementById('login-btn').disabled = true;

            try {
                // Skrypt pobierający ZASZYFROWANY plik z serwera GitHuba .enc na podstawie kryptograficznego skrótu (Hash) hasła
                const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);

                const response = await fetch(`${hashHex}.enc`);
                if (!response.ok) {
                    // Opcjonalny Fallback na wypadek gdyby chcieli uzywac ZIP przez podanie nazwy pliku tak jak w poprzedniej uproszczonej logice
                    const fallbackZip = await fetch(`${pass}.zip`);
                    if (!fallbackZip.ok) throw new Error("Błąd: Nie odnaleziono bazy o tym haśle/nazwie (Brak pliku na GitHubie)!");
                    
                    const blob = await fallbackZip.blob();
                    currentNick = nick;
                    currentDB = pass;
                    await processZipBlob(blob);
                    
                } else {
                    // Proces Deszyfracji!
                    const encryptedBuffer = await response.arrayBuffer();
                    const encryptedData = new Uint8Array(encryptedBuffer);
                    
                    // Odczyt wektorów [16b Salt] [12b IV] [Właściwy Szyfr...]
                    if (encryptedData.length < 28) throw new Error("Zaszyfrowany plik jest uszkodzony.");
                    
                    const salt = encryptedData.slice(0, 16);
                    const iv = encryptedData.slice(16, 28);
                    const payload = encryptedData.slice(28);

                    // Dekodowanie klucza z wpisanego hasła wgłąb PBKDF2
                    const enc = new TextEncoder();
                    const keyMaterial = await crypto.subtle.importKey(
                        "raw", enc.encode(pass), { name: "PBKDF2" }, false, ["deriveBits", "deriveKey"]
                    );
                    const key = await crypto.subtle.deriveKey(
                        { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
                    );

                    // Realne Odszyfrowanie z pamięci RAM do RAMu!
                    const decryptedBuffer = await crypto.subtle.decrypt(
                        { name: "AES-GCM", iv: iv }, key, payload
                    );

                    const decryptedBlob = new Blob([decryptedBuffer], { type: "application/zip" });

                    currentNick = nick;
                    currentDB = pass;
                    await processZipBlob(decryptedBlob);
                }

                status.innerText = "Udane Logowanie! Wczytywanie systemu...";
                status.className = "mt-4 text-xs font-bold text-green-500 min-h-4 tracking-wider";
            } catch (err) {
                console.error(err);
                if (err.name === "OperationError") {
                    status.innerText = "Odmowa Dostępu: Hasło jest niepoprawne!";
                } else {
                    status.innerText = err.message;
                }
                status.className = "mt-4 text-xs font-bold text-red-500 min-h-4 tracking-wider";
                document.getElementById('login-btn').disabled = false;
            }
        });

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const nick = document.getElementById('nick-input').value.trim() || 'Gość_Offline';
            currentNick = nick;
            currentDB = file.name;
            await processZipBlob(file);
        });

        async function processZipBlob(fileOrBlob) {
            const zip = await JSZip.loadAsync(fileOrBlob);
            const files = Object.keys(zip.files).filter(n => n.endsWith('.txt'));
            
            const storageKey = `chts_progress_${currentNick}_${currentDB}`;
            const savedStateStr = localStorage.getItem(storageKey);
            let tempArray = [];
            
            if (savedStateStr) {
                try {
                    const parsed = JSON.parse(savedStateStr);
                    if (parsed.stats && parsed.data) {
                        // Zapis w nowym precyzyjnym formacie
                        tempArray = parsed.data;
                        stats = parsed.stats;
                        console.log("Przywrócono zapisany postęp agenta (wraz z dokładnymi statystykami): " + currentNick);
                    } else {
                        // Stary format (fallback)
                        tempArray = parsed;
                        console.log("Przywrócono zapisany postęp agenta ze starego zapisu: " + currentNick);
                        stats.correct = 0; stats.wrong = 0; stats.mastered = 0;
                        tempArray.forEach(q => {
                            if (q.currentMastery >= q.requiredMastery) stats.mastered++;
                            stats.correct += q.currentMastery;
                        });
                    }
                } catch(e) {
                    console.error("Błąd ładowania progresu", e);
                }
            }
            
            if (tempArray.length === 0) {
                for (let name of files) {
                    const content = await zip.files[name].async("string");
                    let q = parseV3(content);
                    q.idParam = name; // dodaj widoczne ID jeśli potrzeba zachować 
                    q.currentMastery = 0;
                    q.requiredMastery = 2;
                    q.totalErrors = 0;
                    tempArray.push(q);
                }
                shuffle(tempArray);
            }

            quizData = tempArray;

            document.getElementById('upload-screen').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            document.getElementById('nav-controls').classList.remove('hidden');
            
            // Welcome message with Nick
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = "text-center mb-6 text-xs text-zinc-500 font-bold uppercase tracking-widest";
            welcomeDiv.innerHTML = `OPERATOR ZALOGOWANY: <span class="text-orange">${currentNick}</span>`;
            document.getElementById('main-card').insertBefore(welcomeDiv, document.getElementById('question-screen'));
            
            // Force statistics update
            processLogic(null); 
            render();
        }

        function parseV3(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            return {
                type: lines.find(l => l.startsWith('TYP:'))?.split(': ')[1] || "ABCD",
                nr: lines.find(l => l.startsWith('NR:'))?.split(': ')[1] || "?",
                content: lines.find(l => l.startsWith('PYTANIE:'))?.replace('PYTANIE: ', ''),
                options: lines.slice(lines.indexOf('TRESC:') + 1),
                correctIndices: lines[0].substring(1).split('').map((v, i) => v === '1' ? i : null).filter(v => v !== null),
                lukiAnswers: lines.includes('LUKI_ANSWERS:') 
                    ? lines.slice(lines.indexOf('LUKI_ANSWERS:') + 1, lines.indexOf('TRESC:'))
                    : []
            };
        }

        function render() {
            const q = quizData[currentIndex];
            isAnswered = false;
            selectedIndices = [];
            messageArea.innerText = "";
            actionBtn.innerText = "Sprawdź";
            actionBtn.className = "w-full bg-orange text-black py-5 rounded-2xl font-black uppercase text-sm shadow-lg transition-all active:scale-95";
            
            document.getElementById('question-text').innerText = q.content;
            document.getElementById('type-tag').innerText = q.type;
            document.getElementById('question-nr').innerText = `ID: ${q.nr}`;
            
            const dots = document.getElementById('mastery-dots');
            dots.innerHTML = '';
            for(let i=0; i<q.requiredMastery; i++) {
                const d = document.createElement('div');
                d.className = `w-1.5 h-1.5 rounded-full ${i < q.currentMastery ? 'bg-orange shadow-[0_0_5px_#FF6B00]' : 'bg-zinc-800'}`;
                dots.appendChild(d);
            }

            const grid = document.getElementById('options-grid');
            const openArea = document.getElementById('open-area');
            grid.innerHTML = ''; grid.classList.add('hidden'); openArea.classList.add('hidden');

            if (q.type === 'OPEN') {
                openArea.classList.remove('hidden');
                document.getElementById('answer-input').value = '';
                document.getElementById('answer-input').disabled = false;
                document.getElementById('answer-input').className = "w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 text-white font-bold outline-none focus:border-orange transition-all";
            } else if (q.type === 'LUKI') {
                let modifiedContent = q.content;
                let optionsHTML = `<option value="">-- wybierz --</option>`;
                q.options.forEach((opt, i) => {
                    optionsHTML += `<option value="${opt.replace(/"/g, '&quot;')}">${opt}</option>`;
                });

                let foundMarkers = false;
                modifiedContent = modifiedContent.replace(/\(Odpowied[zźż]\s*:?\s*([a-zA-Z0-9]+)\)/gi, (match, p1) => {
                    foundMarkers = true;
                    return `<select id="luka-${p1}" class="luka-select p-2 mx-1 mt-2 rounded bg-zinc-900 border border-orange text-white font-bold outline-none focus:border-green-500 transition-all text-[0.85rem] appearance-none cursor-pointer">${optionsHTML}</select>`;
                });
                
                if (!foundMarkers && q.lukiAnswers && q.lukiAnswers.length > 0) {
                    modifiedContent += `<div class="mt-6 flex flex-col gap-3">`;
                    q.lukiAnswers.forEach(ans => {
                        let parts = ans.split(':');
                        let id = parts[0].trim();
                        modifiedContent += `<div class="flex items-center justify-between bg-zinc-900/50 p-3 rounded-2xl border border-zinc-800">
                            <span class="text-[0.65rem] font-black text-zinc-500 uppercase">LUKA ${id}</span>
                            <select id="luka-${id}" class="luka-select p-3 w-[75%] rounded-xl bg-zinc-950 border border-orange text-white font-bold outline-none focus:border-green-500 transition-all text-[0.8rem] appearance-none cursor-pointer">${optionsHTML}</select>
                        </div>`;
                    });
                    modifiedContent += `</div>`;
                }
                
                document.getElementById('question-text').innerHTML = modifiedContent;
            } else {
                grid.classList.remove('hidden');
                q.options.forEach((opt, i) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-left p-5 rounded-2xl border border-zinc-900 bg-zinc-900/30 text-xs font-bold transition-all";
                    btn.innerText = opt;
                    btn.onclick = () => handleSelect(i, btn);
                    grid.appendChild(btn);
                });
            }
            
            actionBtn.onclick = () => {
                if (!isAnswered) check();
                else changeQuestion(1);
            };
        }

        function handleSelect(idx, btn) {
            if (isAnswered) return;
            const q = quizData[currentIndex];
            if (q.type === 'MULTI' || q.type === 'LUKI') {
                btn.classList.toggle('selected');
                if (selectedIndices.includes(idx)) selectedIndices = selectedIndices.filter(i => i !== idx);
                else selectedIndices.push(idx);
            } else {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedIndices = [idx];
            }
        }

        function check() {
            const q = quizData[currentIndex];
            const isLuki = q.type === 'LUKI';
            const lukiSelects = isLuki ? document.querySelectorAll('.luka-select') : [];
            
            if (q.type !== 'OPEN' && !isLuki && selectedIndices.length === 0) return;
            
            if (isLuki) {
                let allAnswered = true;
                lukiSelects.forEach(s => { if (!s.value) allAnswered = false; });
                if (!allAnswered) {
                    messageArea.innerText = "UZUPEŁNIJ WSZYSTKIE LUKI!";
                    messageArea.className = "mb-4 text-center h-4 text-[10px] font-black uppercase tracking-widest text-orange";
                    return;
                }
            }
            
            isAnswered = true;
            let isPerfect = false;

            if (q.type === 'OPEN') {
                const input = document.getElementById('answer-input');
                isPerfect = input.value.trim().toLowerCase() === q.options[0].toLowerCase();
                input.disabled = true;
                if (!isPerfect) {
                    input.classList.add('bg-red-900/20', 'border-red-500', 'text-red-500');
                    messageArea.innerText = `ODPOWIEDŹ: ${q.options[0]}`;
                } else {
                    input.classList.add('bg-green-900/20', 'border-green-500', 'text-green-500');
                }
            } else if (q.type === 'LUKI') {
                isPerfect = true;
                let correctMap = {};
                if (q.lukiAnswers && q.lukiAnswers.length > 0) {
                    q.lukiAnswers.forEach(ans => {
                        let parts = ans.split(':');
                        if (parts.length > 1) {
                            correctMap[parts[0].trim()] = parts.slice(1).join(':').trim().toLowerCase();
                        }
                    });
                }

                lukiSelects.forEach(sel => {
                    sel.disabled = true;
                    let id = sel.id.replace('luka-', '');
                    let expected = correctMap[id];
                    let userVal = sel.value.trim().toLowerCase();
                    
                    sel.classList.remove('border-orange');
                    if (expected && userVal === expected) {
                        sel.classList.add('bg-green-900/40', 'border-green-500', 'text-green-500');
                    } else {
                        isPerfect = false;
                        sel.classList.add('bg-red-900/40', 'border-red-500', 'text-red-500');
                        sel.outerHTML += `<span class="text-green-500 text-xs ml-1 font-black block mt-1 mb-2">[Poprawna: ${expected || 'Brak danych'}]</span>`;
                    }
                });
            } else {
                // Rygorystyczna logika dla MULTI / ABCD
                isPerfect = JSON.stringify(selectedIndices.sort()) === JSON.stringify(q.correctIndices.sort());
                
                document.querySelectorAll('.option-btn').forEach((btn, i) => {
                    btn.disabled = true;
                    const isCorrect = q.correctIndices.includes(i);
                    const isSelected = selectedIndices.includes(i);

                    if (isCorrect && isSelected) {
                        btn.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-green-500 bg-green-900/20 text-green-500 font-black";
                    } else if (isCorrect && !isSelected) {
                        btn.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-orange-500 bg-orange-900/20 text-orange-500 font-black";
                    } else if (!isCorrect && isSelected) {
                        btn.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-red-500 bg-red-900/20 text-red-500 font-black";
                    }
                });
            }

            processLogic(isPerfect);
            actionBtn.innerText = "Następny ➡️";
            actionBtn.className = "w-full bg-zinc-100 text-black py-5 rounded-2xl font-black uppercase text-sm shadow-xl active:scale-95 transition-all";
        }

        function processLogic(correct) {
            const q = quizData[currentIndex];
            if (correct !== null) { // Jeśli correct == null, funkcja tylko odświeża paski
                if (correct) {
                    stats.correct++;
                    q.currentMastery++;
                    if (q.currentMastery === 2 && q.totalErrors === 0) {
                        messageArea.innerText = "ALE LEKKIE ⚡";
                        messageArea.className = "mb-4 text-center h-4 text-[10px] font-black uppercase tracking-widest text-green-500";
                    }
                    if (q.currentMastery >= q.requiredMastery) stats.mastered++;
                } else {
                    stats.wrong++;
                    if (q.currentMastery === 1) {
                        messageArea.innerText = "SYZYF 🪨";
                        messageArea.className = "mb-4 text-center h-4 text-[10px] font-black uppercase tracking-widest text-red-500";
                    }
                    q.totalErrors++;
                    q.currentMastery = 0;
                    q.requiredMastery++;
                }

                // Zapis lokalnego postępu i dokładnych statystyk
                const storageKey = `chts_progress_${currentNick}_${currentDB}`;
                const payload = { data: quizData, stats: stats };
                localStorage.setItem(storageKey, JSON.stringify(payload));
            }

            document.getElementById('stat-correct').innerText = stats.correct;
            document.getElementById('stat-wrong').innerText = stats.wrong;
            const p = Math.round((stats.mastered / quizData.length) * 100) || 0;
            document.getElementById('mastery-bar').style.width = `${p}%`;
            document.getElementById('mastery-global').innerText = `${p}%`;
        }

        function changeQuestion(dir) {
            let next = currentIndex + dir;
            while (next >= 0 && next < quizData.length && quizData[next].currentMastery >= quizData[next].requiredMastery && stats.mastered < quizData.length) {
                next += dir;
            }
            if (next >= 0 && next < quizData.length) {
                currentIndex = next;
                render();
            } else if (stats.mastered >= quizData.length) {
                alert("LEKKO! Opanowałeś wszystkie chrupki! 🐆🧀");
            }
        }
    </script>
</body>
</html>
